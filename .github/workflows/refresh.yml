name: Refresh data
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r scraper/requirements.txt
      - name: Scrape prix (gputracker) + benchmarks (PassMark)
        run: python scraper/main.py --categories gpus,cpus --out-dir .
      - name: Telecharger les images produit
        run: python scraper/download_images.py --json gpus.json --images-dir images
      - name: Restaurer les references d'images existantes
        run: python scraper/restore_images.py --data-repo .
      # Offres par composant de l'app (GPU/CPU/RAM/SSD/cartes meres/alims/
      # boitiers) : prix constates multi-boutiques A JOUR a chaque execution.
      # Les listes de composants vivent dans catalog/ (copie des assets app).
      - name: Offres par composant (toutes categories)
        run: python scraper/enrich_catalog.py --data-repo . --items-dir catalog
      # Source de prix SUPPLEMENTAIRE (lot 21) : Newegg (USD) ajoute des prix
      # verifies americains a gpus_app.json / cpus_app.json, en plus des offres
      # euro. L'app filtre par pays de livraison et convertit les devises.
      - name: Prix US (Newegg)
        run: python scraper/enrich_newegg.py --data-repo . --items-dir catalog --only gpus,cpus
        continue-on-error: true
      # Boutiques a SOURCE DIRECTE (lot 27-29) : LDLC + Materiel.net +
      # Alternate (EUR, stock reel + tout le catalogue), Morele (PLN) et
      # Canada Computers (CAD) — enrichissent les 7 categories id-clees
      # en plus des offres gputracker/Newegg.
      - name: Prix boutiques directes (LDLC, Materiel.net, Alternate, Morele, Canada Computers)
        run: python scraper/enrich_shops.py --data-repo . --items-dir catalog
        continue-on-error: true
      # Nettoyage FINAL (lot 29b) : retire des prices[] fusionnes les accessoires
      # (waterblock, backplate, cable...) et les aberrations basses (< 0,4x la
      # mediane) qui ont echappe aux filtres par-source, et recalcule priceMin.
      - name: Nettoyage des offres (accessoires + aberrations)
        run: python scraper/nettoyer_offres.py --data-repo .
        continue-on-error: true
      # Photos par MODELE (variante AIB) pour les modeles sans image d'offre
      # (lot 17, item 3) : incremental, ne re-cherche que les nouveaux.
      - name: Images par modele (variantes AIB)
        run: python scraper/fetch_model_images.py --data-repo .
        continue-on-error: true
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "data: refresh auto (prix+offres+benchmarks+images)"
          git push
