name: Refresh data
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r scraper/requirements.txt
      - name: Scrape prix (gputracker) + benchmarks (PassMark)
        run: python scraper/main.py --categories gpus,cpus --out-dir .
      - name: Telecharger les images produit
        run: python scraper/download_images.py --json gpus.json --images-dir images
      - name: Restaurer les references d'images existantes
        run: python scraper/restore_images.py --data-repo .
      # Offres par composant de l'app (GPU/CPU/RAM/SSD/cartes meres/alims/
      # boitiers) : prix constates multi-boutiques A JOUR a chaque execution.
      # Les listes de composants vivent dans catalog/ (copie des assets app).
      - name: Offres par composant (toutes categories)
        run: python scraper/enrich_catalog.py --data-repo . --items-dir catalog
      # Photos par MODELE (variante AIB) pour les modeles sans image d'offre
      # (lot 17, item 3) : incremental, ne re-cherche que les nouveaux.
      - name: Images par modele (variantes AIB)
        run: python scraper/fetch_model_images.py --data-repo .
        continue-on-error: true
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "data: refresh auto (prix+offres+benchmarks+images)"
          git push
