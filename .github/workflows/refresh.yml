name: Refresh data
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r scraper/requirements.txt
      - name: Scrape prix (gputracker) + benchmarks (PassMark)
        run: python scraper/main.py --categories gpus,cpus --out-dir .
      - name: Telecharger les images produit
        run: python scraper/download_images.py --json gpus.json --images-dir images
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gpus.json cpus.json meta.json images || true
          git diff --cached --quiet || git commit -m "data: refresh auto (prix+benchmarks+images)"
          git push
